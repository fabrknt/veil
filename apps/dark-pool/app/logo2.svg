<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffcc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00cc99;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="#0b0e14"/>

  <!-- Large "V" — bold, centered, dominant -->
  <g filter="url(#glow)">
    <text x="256" y="320" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="280" fill="url(#grad)">V</text>
  </g>

  <!-- Horizontal line through V — represents the "veil" / hidden layer -->
  <rect x="100" y="235" width="312" height="3" rx="1.5" fill="#00ffcc" opacity="0.3"/>
  <rect x="130" y="255" width="252" height="2" rx="1" fill="#00ffcc" opacity="0.15"/>

  <!-- DARK POOL text — large, readable -->
  <text x="256" y="420" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="48" letter-spacing="8" fill="#00ffcc">DARK POOL</text>

  <!-- Subtle tagline -->
  <text x="256" y="460" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="20" letter-spacing="3" fill="#4a6670">PRIVATE EXECUTION</text>
</svg>
